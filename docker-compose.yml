version: "3.9"

services:
  db:
    image: postgres:16
    container_name: blogicum_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-blogicum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-blogicum}
      POSTGRES_DB: ${POSTGRES_DB:-blogicum}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-blogicum} -d ${POSTGRES_DB:-blogicum}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: blogicum_web
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs

volumes:
  pg_data:
